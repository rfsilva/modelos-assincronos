server:
  port: 8081
  servlet:
    context-path: /api/v1

spring:
  application:
    name: arquitetura-resiliente
  
  profiles:
    active: local
  
  datasource:
    url: jdbc:postgresql://localhost:5432/sinistros_resiliente
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  
  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: sinistros-resiliente
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.seguradora.resiliente"
      auto-offset-reset: earliest
  
  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 24h
      cache-null-values: false
  
  # Security Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080/auth/realms/sinistros}

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      detran:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
        recordExceptions:
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - com.seguradora.resiliente.exception.DetranIndisponivelException
      
      payment:
        registerHealthIndicator: true
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 5
        waitDurationInOpenState: 60s
        failureRateThreshold: 60
  
  retry:
    instances:
      detran:
        maxAttempts: 3
        waitDuration: 2s
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.net.SocketTimeoutException
          - java.net.ConnectException
        ignoreExceptions:
          - com.seguradora.resiliente.exception.DetranDadosInvalidosException
      
      payment:
        maxAttempts: 5
        waitDuration: 1s
        exponentialBackoffMultiplier: 1.5
  
  timelimiter:
    instances:
      detran:
        timeoutDuration: 30s
        cancelRunningFuture: true
      payment:
        timeoutDuration: 10s

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
    displayRequestDuration: true
    displayOperationId: true
    defaultModelsExpandDepth: 2
    defaultModelExpandDepth: 2
    docExpansion: none
  show-actuator: true

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,retries
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    circuitbreakers:
      enabled: true
    redis:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
  tracing:
    sampling:
      probability: 1.0

# Application Specific Configuration
app:
  detran:
    base-url: ${DETRAN_BASE_URL:http://localhost:8080/detran-api}
    timeout: 30s
    retry:
      max-attempts: 3
      backoff-delay: 2s
  
  cache:
    detran:
      ttl: 24h
      max-size: 10000
    segurado:
      ttl: 1h
      max-size: 5000
  
  async:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 1000
    thread-name-prefix: "async-"
  
  kafka:
    topics:
      detran-retry: detran-retry-topic
      sinistro-events: sinistro-events-topic
      notification-events: notification-events-topic

# Logging Configuration
logging:
  level:
    com.seguradora.resiliente: DEBUG
    org.springframework.web: INFO
    org.springframework.kafka: INFO
    io.github.resilience4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
  file:
    name: logs/arquitetura-resiliente.log

---
# Local Profile
spring:
  config:
    activate:
      on-profile: local
  
  datasource:
    url: jdbc:h2:mem:sinistros_resiliente
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

app:
  detran:
    base-url: http://localhost:8080/detran-api

---
# Test Profile
spring:
  config:
    activate:
      on-profile: test
  
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
  
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}

resilience4j:
  circuitbreaker:
    instances:
      detran:
        slidingWindowSize: 5
        minimumNumberOfCalls: 3