global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Aplicação Resiliente
  - job_name: 'arquitetura-resiliente'
    static_configs:
      - targets: ['host.docker.internal:8081']
    metrics_path: '/api/v1/actuator/prometheus'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Detran Simulator
  - job_name: 'detran-simulator'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: '/detran-api/actuator/prometheus'
    scrape_interval: 15s
    scrape_timeout: 5s

  # Redis Exporter (se instalado)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 15s

  # Kafka Exporter (se instalado)
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
    scrape_interval: 15s

  # PostgreSQL Exporter (se instalado)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']