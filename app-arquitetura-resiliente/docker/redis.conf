# Configuração Redis para Arquitetura Resiliente

# Configurações básicas
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 300

# Configurações de memória
maxmemory 512mb
maxmemory-policy allkeys-lru

# Configurações de persistência
save 900 1
save 300 10
save 60 10000

# Configurações de log
loglevel notice
logfile ""

# Configurações de performance
tcp-backlog 511
databases 16

# Configurações de segurança
# requirepass resiliente_redis_pass

# Configurações específicas para cache
# TTL padrão para chaves sem expiração explícita
# default-ttl 86400

# Configurações de cluster (se necessário no futuro)
# cluster-enabled no

# Configurações de monitoramento
latency-monitor-threshold 100