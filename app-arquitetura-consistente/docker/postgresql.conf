# Configuração PostgreSQL para Arquitetura Consistente
# Otimizada para transações ACID e consistência

# Configurações de conexão
listen_addresses = '*'
port = 5432
max_connections = 100

# Configurações de memória
shared_buffers = 256MB
effective_cache_size = 1GB
maintenance_work_mem = 64MB
work_mem = 4MB

# Configurações de WAL (Write-Ahead Logging) para consistência
wal_level = replica
synchronous_commit = on
wal_sync_method = fsync
full_page_writes = on
wal_buffers = 16MB
wal_writer_delay = 200ms
commit_delay = 0
commit_siblings = 5

# Configurações de checkpoint
checkpoint_completion_target = 0.9
checkpoint_timeout = 5min
max_wal_size = 1GB
min_wal_size = 80MB

# Configurações de timeout para transações longas (sagas)
statement_timeout = 300s
lock_timeout = 30s
idle_in_transaction_session_timeout = 600s
tcp_keepalives_idle = 600
tcp_keepalives_interval = 30
tcp_keepalives_count = 3

# Configurações de isolamento
default_transaction_isolation = 'read committed'
row_security = on

# Configurações de logging para auditoria
logging_collector = on
log_destination = 'stderr'
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = on

# Log de statements para auditoria
log_statement = 'mod'
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 10MB

# Configurações de performance
random_page_cost = 1.1
effective_io_concurrency = 200
max_worker_processes = 8
max_parallel_workers_per_gather = 2
max_parallel_workers = 8
max_parallel_maintenance_workers = 2

# Configurações de estatísticas
default_statistics_target = 100
track_activities = on
track_counts = on
track_io_timing = on
track_functions = pl

# Configurações de autovacuum
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_scale_factor = 0.1
autovacuum_freeze_max_age = 200000000
autovacuum_multixact_freeze_max_age = 400000000
autovacuum_vacuum_cost_delay = 20ms
autovacuum_vacuum_cost_limit = 200

# Configurações de segurança
ssl = off
password_encryption = scram-sha-256

# Configurações específicas para sagas
deadlock_timeout = 1s
max_locks_per_transaction = 64
max_pred_locks_per_transaction = 64