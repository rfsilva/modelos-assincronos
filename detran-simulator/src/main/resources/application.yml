server:
  port: 8080
  servlet:
    context-path: /detran-api

spring:
  application:
    name: detran-simulator
  
  datasource:
    url: jdbc:h2:mem:detran_db
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
  
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# Configurações do SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
    displayRequestDuration: true
    displayOperationId: true
    defaultModelsExpandDepth: 2
    defaultModelExpandDepth: 2
    docExpansion: none
  show-actuator: true
  group-configs:
    - group: 'detran-api'
      display-name: 'Detran Simulator API'
      paths-to-match: 
        - '/veiculo/**'
        - '/monitoring/**'

# Configurações do Simulador
detran:
  simulator:
    # Configurações de Instabilidade
    instability:
      enabled: true
      failure-rate: 0.15          # 15% de falhas (indisponibilidade)
      timeout-rate: 0.10          # 10% de timeouts
      slow-response-rate: 0.25    # 25% de respostas lentas
    
    # Configurações de Performance
    performance:
      min-response-time: 500      # Mínimo 500ms
      max-response-time: 8000     # Máximo 8s
      slow-response-time: 5000    # Respostas "lentas" > 5s
      timeout-threshold: 30000    # Timeout após 30s
    
    # Configurações de Dados
    data:
      invalid-data-rate: 0.10     # 10% de dados inválidos
      cache-simulation: true      # Simular cache interno
      cache-ttl: 300             # TTL do cache em segundos

# Configurações de Monitoramento
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    com.seguradora.detran: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"