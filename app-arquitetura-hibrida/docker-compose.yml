version: '3.8'

services:
  # PostgreSQL Write Side - Event Store (ESSENCIAL para Command Side)
  postgres-write:
    image: postgres:15-alpine
    container_name: hibrida-postgres-write
    environment:
      POSTGRES_DB: sinistros_eventstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_write_data:/var/lib/postgresql/data
      - ./docker/init-eventstore-db.sql:/docker-entrypoint-initdb.d/init-eventstore-db.sql
    networks:
      - hibrida-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Read Side - Projections (ESSENCIAL para Query Side)
  postgres-read:
    image: postgres:15-alpine
    container_name: hibrida-postgres-read
    environment:
      POSTGRES_DB: sinistros_projections
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres_read_data:/var/lib/postgresql/data
      - ./docker/init-projections-db.sql:/docker-entrypoint-initdb.d/init-projections-db.sql
    networks:
      - hibrida-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (ESSENCIAL para Query Side performance)
  redis:
    image: redis:7-alpine
    container_name: hibrida-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru --databases 16
    networks:
      - hibrida-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: hibrida-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - hibrida-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Event Bus (ESSENCIAL para CQRS)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: hibrida-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      # Configurações específicas para Event Sourcing
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_CLEANUP_POLICY: 'compact,delete'
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - hibrida-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Kafka Init - Cria tópicos automaticamente
  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    container_name: hibrida-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ['/bin/sh', '-c']
    command: |
      "
      # Aguardar Kafka estar pronto
      echo 'Aguardando Kafka estar pronto...'
      cub kafka-ready -b kafka:29092 1 30
      
      # Criar tópicos de eventos de domínio
      echo 'Criando tópicos de Segurado...'
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic segurado.criado
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic segurado.atualizado
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic segurado.desativado
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic segurado.reativado
      
      echo 'Criando tópicos de Apólice...'
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic apolice.criada
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic apolice.atualizada
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic apolice.cancelada
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic apolice.renovada
      
      echo 'Criando tópicos de Sinistro...'
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic sinistro.criado
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic sinistro.atualizado
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic sinistro.aprovado
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic sinistro.rejeitado
      
      echo 'Tópicos criados com sucesso!'
      kafka-topics --list --bootstrap-server kafka:29092
      "
    networks:
      - hibrida-network

volumes:
  postgres_write_data:
    driver: local
  postgres_read_data:
    driver: local
  redis_data:
    driver: local
  zookeeper_data:
    driver: local
  kafka_data:
    driver: local

networks:
  hibrida-network:
    driver: bridge
    name: hibrida-network
