# Configuração do Sistema de Replay de Eventos
eventstore:
  replay:
    # Habilita o sistema de replay
    enabled: true
    
    # Configurações padrão para replay
    defaults:
      # Tamanho padrão do lote
      batch-size: 100
      
      # Timeout padrão por lote (segundos)
      batch-timeout-seconds: 30
      
      # Número máximo de tentativas
      max-retries: 3
      
      # Delay entre tentativas (milissegundos)
      retry-delay-ms: 1000
      
      # Parar no primeiro erro
      stop-on-error: false
      
      # Gerar relatório detalhado por padrão
      generate-detailed-report: false
      
      # Intervalo de notificação de progresso
      progress-notification-interval: 1000
    
    # Configurações de performance
    performance:
      # Número máximo de replays simultâneos
      max-concurrent-replays: 5
      
      # Tamanho do pool de threads
      thread-pool-size: 10
      
      # Timeout para operações de replay (segundos)
      operation-timeout-seconds: 3600 # 1 hora
      
      # Tamanho máximo da fila de replays
      max-queue-size: 100
      
      # Habilita cache de eventos para replay
      enable-event-cache: true
      
      # TTL do cache de eventos (segundos)
      event-cache-ttl-seconds: 300 # 5 minutos
    
    # Configurações de monitoramento
    monitoring:
      # Habilita métricas detalhadas
      enable-detailed-metrics: true
      
      # Habilita health checks
      enable-health-checks: true
      
      # Intervalo de coleta de métricas (segundos)
      metrics-collection-interval-seconds: 60
      
      # Número máximo de resultados no histórico
      max-history-size: 1000
      
      # Habilita logs detalhados
      enable-detailed-logging: false
      
      # Nível de log para replay
      log-level: INFO

# Configurações específicas por ambiente
---
spring:
  config:
    activate:
      on-profile: development

eventstore:
  replay:
    defaults:
      batch-size: 50
      generate-detailed-report: true
    performance:
      max-concurrent-replays: 2
      thread-pool-size: 5
    monitoring:
      enable-detailed-logging: true
      log-level: DEBUG

---
spring:
  config:
    activate:
      on-profile: production

eventstore:
  replay:
    defaults:
      batch-size: 200
      batch-timeout-seconds: 60
    performance:
      max-concurrent-replays: 10
      thread-pool-size: 20
      operation-timeout-seconds: 7200 # 2 horas
    monitoring:
      enable-detailed-logging: false
      log-level: WARN