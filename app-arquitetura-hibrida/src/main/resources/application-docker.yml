# =====================================================
# Configuração Docker Profile (CORRIGIDA)
# =====================================================
# Autor: Principal Java Architect
# Data: 2024-12-19
# Descrição: Configurações específicas para ambiente Docker
#            com portas ajustadas para evitar conflitos
# =====================================================

spring:
  # Redis Configuration for Docker (PORTA CORRIGIDA)
  data:
    redis:
      host: redis
      port: 6379  # Porta interna do container (não a externa 6380)
      password: 
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  
  # Kafka Configuration for Docker (PORTA CORRIGIDA)
  kafka:
    bootstrap-servers: kafka:29092  # Porta interna do container
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        batch.size: 16384
        linger.ms: 5
        buffer.memory: 33554432
    consumer:
      group-id: sinistros-hibrida-docker
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.seguradora.hibrida"
      auto-offset-reset: earliest
      max-poll-records: 500
      fetch-min-size: 1024
      fetch-max-wait: 500ms

# Application Specific Configuration for Docker
app:
  # DataSources Configuration for Docker
  datasource:
    write:
      url: jdbc:postgresql://postgres-write:5432/sinistros_eventstore
      username: postgres
      password: postgres
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
        validation-timeout: 5000
        connection-test-query: "SELECT 1"
        pool-name: "WritePool-Docker"
      flyway:
        enabled: true
        locations: ["classpath:db/migration"]
        default-schema: "eventstore"
        table: "flyway_schema_history"
        validate-on-migrate: true
        baseline-on-migrate: true
      jpa:
        show-sql: false
        format-sql: false
        ddl-auto: "validate"
        dialect: "org.hibernate.dialect.PostgreSQLDialect"
        batch-size: 50
        order-inserts: true
        order-updates: true
    
    read:
      url: jdbc:postgresql://postgres-read:5432/sinistros_projections
      username: postgres
      password: postgres
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 50
        minimum-idle: 10
        connection-timeout: 20000
        idle-timeout: 300000
        max-lifetime: 900000
        validation-timeout: 3000
        connection-test-query: "SELECT 1"
        pool-name: "ReadPool-Docker"
        read-only: true
      flyway:
        enabled: true
        locations: ["classpath:db/migration-projections"]
        default-schema: "projections"
        table: "flyway_schema_history_projections"
        validate-on-migrate: true
        baseline-on-migrate: true
      jpa:
        show-sql: false
        format-sql: false
        ddl-auto: "validate"
        dialect: "org.hibernate.dialect.PostgreSQLDialect"
        fetch-size: 100
        use-second-level-cache: true
        use-query-cache: true
      fallback:
        enabled: true
        failure-detection-timeout: 5000
        retry-interval: 30000
        max-retries: 3

  # Cache Configuration for Docker
  cache:
    detran:
      ttl: 24h
      max-size: 10000
    query:
      ttl: 5m
      max-size: 5000

  # Async Configuration for Docker
  async:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 1000
    thread-name-prefix: "async-docker-"

  # Kafka Topics for Docker
  kafka:
    topics:
      domain-events: domain-events-topic
      integration-events: integration-events-topic
      notification-events: notification-events-topic

# Event Store Configuration for Docker
eventstore:
  serialization:
    format: json
    compression: gzip
    compression-threshold: 1024
    versioning-enabled: true
  performance:
    batch-size: 100
    write-timeout: 30
    read-timeout: 15
    cache-enabled: true
    cache-ttl: 300
  monitoring:
    metrics-enabled: true
    health-check-enabled: true
    metrics-interval: 60
    performance-logs-enabled: false
  
  # Configurações de Particionamento para Docker
  partitioning:
    enabled: true
    strategy: monthly
    future-partitions: 3
    auto-indexes: true
    performance-optimizations: true
  
  # Configurações de Arquivamento para Docker
  archive:
    enabled: true
    archive-after-years: 2
    delete-after-archive: false
    archive-pause-ms: 1000
    storage:
      type: filesystem
      base-path: /app/data/archives
  
  # Configurações de Manutenção para Docker
  maintenance:
    enabled: true
    health-check-enabled: true
    health-check-interval-hours: 6
    log-cleanup-enabled: true
    log-retention-days: 90
    reports-enabled: true
  
  # Configurações de Replay para Docker
  replay:
    enabled: true
    defaults:
      batch-size: 100
      batch-timeout-seconds: 30
      max-retries: 3
      retry-delay-ms: 1000
      stop-on-error: false
      generate-detailed-report: false
      progress-notification-interval: 1000
    performance:
      max-concurrent-replays: 5
      thread-pool-size: 10
      operation-timeout-seconds: 3600
      max-queue-size: 100
      enable-event-cache: true
      event-cache-ttl-seconds: 300
    monitoring:
      enable-detailed-metrics: true
      enable-health-checks: true
      metrics-collection-interval-seconds: 60
      max-history-size: 1000
      enable-detailed-logging: false
      log-level: INFO

# Snapshot Configuration for Docker
snapshot:
  snapshot-threshold: 50
  max-snapshots-per-aggregate: 5
  compression-threshold: 1024
  compression-algorithm: GZIP
  compression-enabled: true
  auto-cleanup-enabled: true
  cleanup-interval-hours: 24
  async-snapshot-creation: true
  operation-timeout-seconds: 30
  integrity-validation-enabled: true
  metrics-enabled: true
  retention-days: 365
  async-thread-pool-size: 5
  async-queue-capacity: 100
  async-thread-name-prefix: "snapshot-docker-"
  health-check-enabled: true
  health-check-interval-seconds: 60
  max-consecutive-failures: 3
  cache-enabled: false
  cache-max-size: 100
  cache-ttl-minutes: 30

# CQRS Configuration for Docker
cqrs:
  command:
    timeout: 30s
    retry:
      max-attempts: 3
      backoff: 1s
  query:
    cache:
      ttl: 300s
      max-size: 10000
  projection:
    batch-size: 50
    parallel: true
    thread-pool:
      core-size: 5
      max-size: 20
      queue-capacity: 1000
      thread-name-prefix: "projection-docker-"
    timeout-seconds: 30
    retry:
      max-attempts: 3
      backoff-multiplier: 2.0
      initial-delay-ms: 1000
      max-delay-ms: 30000

# Logging Configuration for Docker
logging:
  level:
    com.seguradora.hibrida: INFO
    org.springframework.web: WARN
    org.springframework.kafka: WARN
    org.axonframework: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
  file:
    name: /app/logs/arquitetura-hibrida-docker.log

# Management/Actuator Configuration for Docker
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,eventstore,snapshots,cqrs,replay
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    redis:
      enabled: true
    db:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
  tracing:
    sampling:
      probability: 0.1  # Reduzido para Docker