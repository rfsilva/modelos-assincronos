# Event Bus Configuration
event-bus:
  # Configurações do pool de threads
  thread-pool:
    core-size: 8
    max-size: 16
    keep-alive-seconds: 60
    queue-capacity: 1000
    thread-name-prefix: "EventBus-Worker"
  
  # Configurações de retry
  retry:
    enabled: true
    max-attempts: 3
    initial-delay-ms: 1000
    backoff-multiplier: 2.0
    max-delay-ms: 30000
    jitter-percent: 0.1
  
  # Configurações de timeout
  timeout:
    default-handler-timeout-seconds: 30
    shutdown-timeout-seconds: 60
  
  # Configurações de monitoramento
  monitoring:
    metrics-enabled: true
    health-check-enabled: true
    detailed-logging: false
    error-rate-threshold: 0.1
  
  # Configurações de Kafka (habilitado por padrão)
  kafka:
    enabled: true
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    default-topic: domain-events
    partitions: 3
    replication-factor: 1
    
    producer:
      acks: all
      retries: 3
      batch-size: 16384
      linger-ms: 5
      buffer-memory: 33554432
    
    consumer:
      group-id: event-bus-consumers
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 500
      session-timeout-ms: 30000

---
# Configurações específicas por ambiente

# Ambiente local - Kafka desabilitado para desenvolvimento simples
spring:
  config:
    activate:
      on-profile: local

event-bus:
  kafka:
    enabled: false

---
# Ambiente de teste - Kafka com TestContainers
spring:
  config:
    activate:
      on-profile: test

event-bus:
  kafka:
    enabled: true
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    default-topic: test-events
    partitions: 1
    replication-factor: 1

---
# Ambiente de produção - Kafka totalmente configurado
spring:
  config:
    activate:
      on-profile: prod

event-bus:
  kafka:
    enabled: true
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    default-topic: domain-events-prod
    partitions: 6
    replication-factor: 3
    
    producer:
      acks: all
      retries: 5
      batch-size: 32768
      linger-ms: 10
      buffer-memory: 67108864
    
    consumer:
      group-id: event-bus-consumers-prod
      max-poll-records: 1000
      session-timeout-ms: 45000