# Configuração Redis para Arquitetura Híbrida
# Otimizada para cache de queries e sessões

# Configurações básicas
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 300

# Configurações de memória para cache de queries
maxmemory 1gb
maxmemory-policy allkeys-lru

# Configurações de persistência (menos agressiva para cache)
save 3600 1
save 300 100
save 60 10000

# Configurações de log
loglevel notice
logfile ""

# Configurações de performance
tcp-backlog 511
databases 16

# Configurações específicas para CQRS
# Database 0: Cache de queries
# Database 1: Sessões de usuário
# Database 2: Cache de projeções
# Database 3: Cache de agregados

# Configurações de cluster (preparado para escala)
# cluster-enabled no
# cluster-config-file nodes-6379.conf
# cluster-node-timeout 15000

# Configurações de monitoramento
latency-monitor-threshold 100

# Configurações de segurança
# requirepass hibrida_redis_pass

# Configurações de cliente
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Configurações de hash (para objetos pequenos)
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# Configurações de list (para filas)
list-max-ziplist-size -2
list-compress-depth 0

# Configurações de set
set-max-intset-entries 512

# Configurações de sorted set
zset-max-ziplist-entries 128
zset-max-ziplist-value 64